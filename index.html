<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#4f46e5" />
<title>Cuidado Dona Nair v1.5</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{--bg:#f4f7fb;--card:#fff;--ink:#10172f;--muted:#687385;--brand:#6d46dc;--blue:#2f71eb;--green:#15956a;--red:#d92d2d;--orange:#ff8500;--soft:#eef3ff;--shadow:0 18px 50px rgba(20,31,60,.10);--radius:28px;--yellow:#f6a400;--line:#d7e3f5}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#f7f9fe,#edf2fa);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--ink);padding-bottom:110px}.splash{position:fixed;inset:0;background:linear-gradient(135deg,#fff,#eef4ff);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99;transition:opacity .45s ease,visibility .45s ease}.splash.hide{opacity:0;visibility:hidden}.splash img{width:160px;height:160px;object-fit:cover;border-radius:22px;box-shadow:var(--shadow)}.splash h1{font-size:34px;margin:24px 0 8px}.splash p{font-size:22px;color:var(--muted);margin:0}.top{padding:28px 28px 40px;border-bottom-left-radius:38px;border-bottom-right-radius:38px;background:linear-gradient(135deg,#742ee6,#2f75ed);color:#fff;box-shadow:0 18px 45px rgba(75,80,220,.25);display:flex;gap:18px;align-items:center}.night .top{background:linear-gradient(135deg,#4b2ecf,#144bb2)}.top img{width:112px;height:112px;border-radius:14px;object-fit:cover;background:#fff;box-shadow:0 8px 24px rgba(0,0,0,.18)}.top h1{font-size:34px;line-height:1.05;margin:0 0 8px;font-weight:900}.top p{margin:0;font-size:20px;opacity:.95}.install{margin-left:auto;border:0;background:white;color:#11172d;padding:18px 22px;border-radius:22px;font-weight:900;font-size:19px;box-shadow:0 8px 20px rgba(0,0,0,.12)}main{padding:28px 22px}.card{background:var(--card);border:1px solid rgba(17,24,39,.06);border-radius:var(--radius);box-shadow:var(--shadow);padding:28px;margin:0 0 24px}.hero{text-align:center;animation:enter .35s ease}.hero .face{font-size:72px;filter:drop-shadow(0 8px 12px rgba(250,180,20,.22));margin-bottom:6px}.kicker{font-size:22px;color:var(--muted);margin-top:6px}.hero h2{font-size:36px;line-height:1.1;margin:12px 0;font-weight:950}.hero p{font-size:23px;line-height:1.35;color:var(--muted);margin:8px auto 24px;max-width:520px}.pill-warn{display:inline-flex;align-items:center;gap:8px;background:#fff1f1;border:1px solid #ffcaca;color:#cf2626;font-size:20px;font-weight:850;border-radius:16px;padding:12px 16px;margin:6px 0 8px}.remaining{display:inline-flex;align-items:center;gap:8px;background:#f1f6ff;border:1px solid #cfe0ff;color:#1456c8;font-size:19px;font-weight:850;border-radius:16px;padding:10px 14px;margin:4px 0 10px}.btn{width:100%;border:0;border-radius:22px;padding:24px 18px;font-size:25px;font-weight:950;color:white;box-shadow:0 14px 30px rgba(255,133,0,.24);transition:transform .08s ease,filter .2s ease}.btn:active{transform:scale(.97);filter:brightness(1.03)}.btn.food{background:linear-gradient(135deg,#ff9a17,#ff7900)}.btn.med{background:linear-gradient(135deg,#8050df,#613bd2)}.btn.gly{background:linear-gradient(135deg,#25b6b0,#13958d)}.help{margin-top:12px;background:#fff3f3;color:var(--red);border:2px solid #ffcaca;box-shadow:none;padding:17px 16px;font-size:21px;border-radius:20px}.status h3,.timeline h3,.family h3,.settings h3{font-size:30px;margin:0 0 20px}.status-box{display:flex;gap:18px;align-items:center;border-radius:22px;padding:20px;border:1px solid}.status-box.red{background:#fff0f0;border-color:#ffcaca;color:var(--red)}.status-box.green{background:#eafaf2;border-color:#c7f0db;color:var(--green)}.dot{width:40px;height:40px;border-radius:50%;box-shadow:inset 0 -7px 9px rgba(0,0,0,.12);flex:0 0 auto}.red .dot{background:#f04438}.green .dot{background:#78bd42}.status-box b{font-size:23px;display:block}.status-box span{font-size:19px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:22px}.stat{background:#f1f5ff;border:1px solid #e4ebff;border-radius:20px;text-align:center;padding:16px 8px}.stat.done{background:#edf9f2;border-color:#ccefdc}.stat.pending{background:#fff9ea;border-color:#ffe4a8}.stat.late{background:#fff2f2;border-color:#ffcaca}.stat.alert{background:#eef4ff;border-color:#cfe0ff}.stat .si{font-size:28px;display:block;margin-bottom:4px}.stat .n{font-size:34px;font-weight:950}.stat .l{font-size:17px;color:var(--muted)}.timeline-head{display:flex;justify-content:space-between;align-items:center}.link{border:0;background:transparent;color:#2f66d9;font-size:18px;font-weight:850}.timeline-list{position:relative;margin-top:12px}.timeline-list:before{content:'';position:absolute;left:20px;top:24px;bottom:24px;width:2px;background:var(--line)}.entry{display:grid;grid-template-columns:44px 76px 1fr 20px;gap:12px;align-items:center;border:1px solid #e5e9f2;border-radius:22px;padding:16px;margin:14px 0;background:#fff;position:relative}.check{width:36px;height:36px;border-radius:50%;background:#2fa365;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:950;font-size:20px;z-index:1}.entry .time{font-size:19px;font-weight:900}.entry b{font-size:21px}.entry p{margin:6px 0 0;color:var(--muted);font-size:17px}.tag{display:inline-block;background:#e9fbf2;color:var(--green);font-weight:900;border-radius:999px;padding:5px 12px;margin-left:8px}.tabs{position:fixed;left:12px;right:12px;bottom:12px;background:rgba(255,255,255,.94);backdrop-filter:blur(12px);border:1px solid #e7ecf5;border-radius:24px;display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:10px;box-shadow:0 12px 40px rgba(20,31,60,.14);z-index:20}.tab{border:0;background:transparent;border-radius:18px;padding:12px 4px;font-size:16px;font-weight:850;color:#596477}.tab.active{background:#eaf1ff;color:#155bc0}.tab .ico{display:block;font-size:28px}.hidden{display:none}.family-list .row{display:flex;justify-content:space-between;gap:12px;align-items:center;border:1px solid #e5e9f2;border-radius:22px;padding:18px;margin:12px 0;font-size:22px;font-weight:900}.csv,.whats,.save{border:0;width:100%;border-radius:22px;padding:22px;font-size:23px;font-weight:950;color:#fff;margin:10px 0}.csv{background:#3d73e6}.whats,.save{background:#15956a}.setting-row{display:flex;align-items:center;gap:16px;border:1px solid #e5e9f2;border-radius:22px;padding:16px;margin:12px 0;font-weight:850;font-size:21px}.setting-row input{font-size:22px;border:0;background:#f0f0f2;border-radius:14px;padding:14px;width:132px}.phone{width:100%;font-size:22px;padding:18px;border:1px solid #e5e9f2;border-radius:18px}.confetti{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:50}.confetti i{position:absolute;top:-20px;font-style:normal;animation:fall 1.5s linear forwards}.toast{position:fixed;left:24px;right:24px;bottom:105px;background:#11172d;color:white;padding:18px 20px;border-radius:18px;text-align:center;font-size:19px;font-weight:900;box-shadow:var(--shadow);z-index:60;opacity:0;transform:translateY(12px);transition:.25s}.toast.show{opacity:1;transform:translateY(0)}@keyframes fall{to{transform:translateY(110vh) rotate(540deg);opacity:.8}}@keyframes enter{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}@media(max-width:560px){.top{padding:22px 22px 34px}.top img{width:92px;height:92px}.top h1{font-size:28px}.top p{font-size:18px}.install{padding:15px 18px;font-size:17px}.hero h2{font-size:31px}.stats{gap:8px}.stat .n{font-size:31px}.stat .l{font-size:16px}.card{padding:24px 20px}}
</style>
</head>
<body>
<div class="splash" id="splash"><img src="logo.jpg" alt="Família Araújo"><h1>Cuidado Dona Nair</h1><p>Cuidando com amor. ❤️</p></div>
<header class="top"><img src="logo.jpg" alt="Família Araújo"><div><h1>Cuidado Dona Nair</h1><p id="dateText"></p></div><button class="install" id="installBtn">Instalar</button></header>
<main>
<section id="home">
<div class="card hero" id="hero"></div>
<div class="card status" id="statusCard"></div>
<div class="card timeline"><div class="timeline-head"><h3>Linha do tempo de hoje</h3><button class="link" onclick="clearToday()">Limpar histórico 🗑️</button></div><div id="timeline"></div></div>
</section>
<section id="family" class="hidden"><div class="card family"><h3>Painel da família</h3><p style="font-size:22px;color:var(--muted)">Resumo rápido para os filhos acompanharem o dia da Dona Nair.</p><div id="familyStatus"></div><div class="family-list" id="familyList"></div></div><div class="card"><h3>Relatório</h3><button class="csv" onclick="downloadCsv()">Baixar CSV para médico</button><button class="whats" onclick="sendWhats()">Enviar resumo no WhatsApp</button></div></section>
<section id="settings" class="hidden"><div class="card settings"><h3>Ajustes da rotina</h3><p style="font-size:21px;color:var(--muted)">Ajuste a rotina básica da Dona Nair.</p><div id="routineInputs"></div><button class="save" onclick="saveRoutine()">Salvar rotina</button><button class="csv" style="background:#eef3ff;color:#11172d" onclick="resetRoutine()">Restaurar padrão</button></div><div class="card"><h3>Contato da família</h3><label style="font-size:20px;font-weight:900">WhatsApp para aviso</label><input class="phone" id="phone" placeholder="5511999999999"><p style="font-size:18px;color:var(--muted)">Use DDI + DDD + número.</p><button class="whats" onclick="savePhone()">Salvar contato</button></div></section>
</main>
<nav class="tabs"><button class="tab active" data-tab="home"><span class="ico">🏠</span>Início</button><button class="tab" data-tab="family"><span class="ico">👨‍👩‍👧</span>Família</button><button class="tab" data-tab="settings"><span class="ico">⚙️</span>Ajustes</button></nav><div class="toast" id="toast"></div><div class="confetti" id="confetti"></div>
<script>
const defaultRoutine=[{id:'med_manha',time:'07:30',label:'Remédio da manhã',type:'med',icon:'💊',button:'JÁ TOMEI'},{id:'cafe',time:'08:00',label:'Café da manhã',type:'food',icon:'☕',button:'JÁ TOMEI CAFÉ'},{id:'glicemia',time:'12:00',label:'Medir glicemia',type:'gly',icon:'🩸',button:'REGISTRAR GLICEMIA'},{id:'almoco',time:'12:30',label:'Almoço',type:'food',icon:'🍽️',button:'JÁ ALMOCEI'},{id:'med_noite',time:'18:00',label:'Remédio da noite',type:'med',icon:'💊',button:'JÁ TOMEI'},{id:'jantar',time:'19:00',label:'Jantar',type:'food',icon:'🌙',button:'JÁ JANTEI'}];
let routine=JSON.parse(localStorage.getItem('nair_routine')||'null')||defaultRoutine;let records=JSON.parse(localStorage.getItem(key())||'[]');let deferredPrompt=null;
function key(){return 'nair_records_'+new Date().toISOString().slice(0,10)}
function today(){return new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}
function minutes(t){let[a,b]=t.split(':').map(Number);return a*60+b}function nowMin(){let d=new Date();return d.getHours()*60+d.getMinutes()}
function done(id){return records.some(r=>r.id===id)}function pending(){return routine.filter(r=>!done(r.id))}function late(){let n=nowMin();return pending().filter(r=>minutes(r.time)<n)}function nextTask(){let p=pending();if(!p.length)return null;let l=late();return l[0]||p.sort((a,b)=>minutes(a.time)-minutes(b.time))[0]}
function greet(){let h=new Date().getHours();document.body.classList.toggle('night',h>=18||h<6);return h<12?'Bom dia':h<18?'Boa tarde':'Boa noite'}function face(){let h=new Date().getHours();return h<18?'🌞':'🌙'}
function render(){document.getElementById('dateText').textContent=today();renderHero();renderStatus();renderTimeline();renderFamily();renderSettings()}
function renderHero(){let task=nextTask(), el=document.getElementById('hero');if(!task){el.innerHTML=`<div class="face">🌞</div><div class="kicker">Tudo concluído</div><h2>Parabéns, Dona Nair! 🎉</h2><p>As atividades cadastradas de hoje foram registradas.</p><button class="btn help" onclick="needHelp()">❤️ PRECISO DE AJUDA</button>`;confetti();return}let isLate=minutes(task.time)<nowMin();el.innerHTML=`<div class="face">${face()}</div><div class="kicker">${task.time} • Próxima atividade</div><h2>${greet()}, Dona Nair</h2>${isLate?`<div class="pill-warn">⏰ Está atrasado: ${task.icon} ${task.label}</div>`:`<p>Agora é hora de: ${task.icon} ${task.label}</p>`}<div class="remaining">🕘 Faltam ${pending().length} registro(s) para concluir o dia.</div><p>Toque no botão quando fizer.</p><button class="btn ${task.type==='med'?'med':task.type==='gly'?'gly':'food'}" onclick="completeTask('${task.id}')">${task.icon} ${task.button}</button><button class="btn help" onclick="needHelp()">❤️ PRECISO DE AJUDA</button>`}
function renderStatus(){let l=late().length,p=pending().length,f=routine.length-p;let good=p===0;let box=good?`<div class="status-box green"><div class="dot"></div><div><b>Tudo em dia</b><span>Dona Nair está com a rotina de hoje concluída.</span></div></div>`:`<div class="status-box red"><div class="dot"></div><div><b>Atenção necessária</b><span>Existem ${l||p} atividade(s) ${l?'atrasada(s)':'pendente(s)'}.</span></div></div>`;document.getElementById('statusCard').innerHTML=`<h3>Status de hoje</h3>${box}<div class="stats"><div class="stat done"><span class="si">✅</span><div class="n">${f}</div><div class="l">Feitas</div></div><div class="stat pending"><span class="si">🕓</span><div class="n">${p}</div><div class="l">Pendentes</div></div><div class="stat late"><span class="si">⏰</span><div class="n">${l}</div><div class="l">Atrasadas</div></div><div class="stat alert"><span class="si">🔔</span><div class="n">0</div><div class="l">Alertas</div></div></div>`}
function renderTimeline(){let el=document.getElementById('timeline');if(!records.length){el.innerHTML='<p style="font-size:21px;color:var(--muted)">Nenhum registro hoje.</p>';return}el.innerHTML='<div class="timeline-list">'+records.map(r=>`<div class="entry"><div class="check">✓</div><div class="time">${r.at}</div><div><b>${r.icon} ${r.label}</b><span class="tag">Feito</span><p>✅ ${r.note||'Confirmado'}</p></div><div>›</div></div>`).join('')+'</div>'}
function renderFamily(){let l=late().length,p=pending().length;document.getElementById('familyStatus').innerHTML=p===0?`<div class="status-box green"><div class="dot"></div><div><b>Dona Nair está bem</b><span>Todas as atividades de hoje foram concluídas.</span></div></div>`:`<div class="status-box red"><div class="dot"></div><div><b>Atenção necessária</b><span>${l||p} atividade(s) precisam de acompanhamento.</span></div></div>`;document.getElementById('familyList').innerHTML=routine.map(r=>`<div class="row"><span>${r.icon} ${r.time} ${r.label}</span><span class="tag">${done(r.id)?'Feito':(minutes(r.time)<nowMin()?'Atrasado':'Pendente')}</span></div>`).join('')}
function renderSettings(){document.getElementById('routineInputs').innerHTML=routine.map(r=>`<div class="setting-row"><input type="time" id="time_${r.id}" value="${r.time}"><span>${r.icon} ${r.label}</span></div>`).join('');document.getElementById('phone').value=localStorage.getItem('nair_phone')||''}
function completeTask(id){let task=routine.find(r=>r.id===id);if(!task||done(id))return;let note='Confirmado';if(task.type==='gly'){let v=prompt('Digite o valor da glicemia em mg/dL:');if(!v)return;note=v+' mg/dL';let num=parseInt(v);if(num<70)alert('Atenção: glicemia baixa. Siga a orientação médica e avise a família.')}let d=new Date();records.push({...task,at:d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),note});localStorage.setItem(key(),JSON.stringify(records));vibrate();toast('Registro salvo com sucesso');render()}
function needHelp(){let phone=localStorage.getItem('nair_phone')||'';let msg=encodeURIComponent('Preciso de ajuda. Sou a Dona Nair.'); if(phone) location.href=`https://wa.me/${phone}?text=${msg}`; else alert('Cadastre o WhatsApp da família em Ajustes.')}function saveRoutine(){routine=routine.map(r=>({...r,time:document.getElementById('time_'+r.id).value||r.time}));localStorage.setItem('nair_routine',JSON.stringify(routine));toast('Rotina salva');render()}function resetRoutine(){routine=defaultRoutine;localStorage.removeItem('nair_routine');toast('Padrão restaurado');render()}function savePhone(){localStorage.setItem('nair_phone',document.getElementById('phone').value.replace(/\D/g,''));toast('Contato salvo')}function clearToday(){if(confirm('Limpar os registros de hoje?')){records=[];localStorage.setItem(key(),'[]');render()}}function downloadCsv(){let csv='hora,tipo,atividade,observacao\n'+records.map(r=>`${r.at},${r.type},${r.label},${r.note||''}`).join('\n');let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='relatorio_dona_nair.csv';a.click()}function sendWhats(){let phone=localStorage.getItem('nair_phone')||'';let msg=encodeURIComponent(`Resumo Dona Nair: ${records.length} atividade(s) registradas hoje. Pendentes: ${pending().length}. Atrasadas: ${late().length}.`); if(phone) location.href=`https://wa.me/${phone}?text=${msg}`; else alert('Cadastre o WhatsApp da família em Ajustes.')}function toast(t){let el=document.getElementById('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800)}function vibrate(){try{navigator.vibrate&&navigator.vibrate(35)}catch(e){}}function confetti(){if(window._confettiDone)return;window._confettiDone=true;let c=document.getElementById('confetti');for(let i=0;i<28;i++){let e=document.createElement('i');e.textContent=['🎉','💜','❤️','✨'][i%4];e.style.left=Math.random()*100+'%';e.style.animationDelay=Math.random()*0.7+'s';c.appendChild(e)}setTimeout(()=>{c.innerHTML='';},2200)}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');['home','family','settings'].forEach(id=>document.getElementById(id).classList.toggle('hidden',id!==b.dataset.tab));render()});window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;});document.getElementById('installBtn').onclick=async()=>{if(deferredPrompt){deferredPrompt.prompt();deferredPrompt=null}else alert('No Android, toque no menu do navegador e escolha “Adicionar à tela inicial”.')};setTimeout(()=>document.getElementById('splash').classList.add('hide'),1100);render();setInterval(render,60000);if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body></html>
